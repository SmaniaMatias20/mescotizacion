name: Bot Cotizaciones

on:
  schedule:
    - cron: "0 12 * * *"   # 9:00 Argentina
  workflow_dispatch:       # permite ejecutarlo manualmente

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar bot
        run: node index.js